services:
  postgres:
    image: postgres:16-alpine
    container_name: goldoffice-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: goldoffice
      POSTGRES_USER: goldoffice
      POSTGRES_PASSWORD: goldoffice
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro

volumes:
  postgres_data:
